<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css_folder/todo_css.css">
    <link rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Todo app</title>
</head>
<body>

    <div class="app">
        <header>
          <h1 data-i18n="my_tasks">
            <i class="fas fa-check-circle"></i>
            My Tasks</h1>
            <p id="date"></p>
        </header>

        <div class="todo-input">
            <input type="text" id="task-input" data-i18n-placeholder="What_do_you_need" placeholder="What do you need to do?">
            <button id="add-task">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <div class="filters">
            <span class="filter active" data-filter="all" data-i18n="all_1">All</span>
            <span class="filter" data-filter="active" data-i18n="active_1">Active</span>
            <span class="filter" data-filter="Completed" data-i18n="complete_1">Completed</span>
        </div>

        <div class="todos-container">
            <ul id="todos-list">
                <!-- li will be inserted right here later in the video -->
               <!-- <li class="todo-item">
                    <label class="checkbox-container">
                       <input type="checkbox" class="todo-checkbox">
                       <span class="checkmark"></span>
                    </label>
                    <span class="todo-item-text">Buy groceries</span>
                    <button class="delete-btn"><i class="fas fa-times"></i></button>
                 </li> -->
            </ul>

            <div class="empty-state hidden">
                <i class="fas fa-clipboard-list"></i>
                <p data-i18n="tasks_here_yet">No tasks here yet</p>

            </div>
        </div>

        <footer>
            <p id="items-left" data-i18n="items_left">0 items left</p>
            <button data-i18n="clear_completed" id="clear-completed">Clear completed</button>
        </footer>

        <div class="btn_languages">
             <button class="btn_lang_rus" data-i18n="Russia_1">Russia</button>
             <button class="btn_lang_eng" data-i18n="English_1">English</button>
             <button class="btn_lang_est" data-i18n="Estonian_1">Estonian</button>
        </div>

    </div>

    <script src="todo_javaScript.js"></script>
    <script src="languages.js"></script>
</body>
</html>
